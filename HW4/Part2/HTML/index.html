
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Dynamic Multiplication Table - Part 2</title>

    <link rel="stylesheet" href="../CSS/style.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery Validation -->
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

    <!-- jQuery UI -->
    <link rel="stylesheet"
        href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

</head>

<body>

<div class="container">

    <h1>Dynamic Multiplication Table</h1>

    <div class="form-box">

        <form id="tableForm">

            <label for="minCol">Minimum Column Value</label>
            <input type="text" id="minCol" name="minCol">
            <div id="minColSlider"></div>

            <label for="maxCol">Maximum Column Value</label>
            <input type="text" id="maxCol" name="maxCol">
            <div id="maxColSlider"></div>

            <label for="minRow">Minimum Row Value</label>
            <input type="text" id="minRow" name="minRow">
            <div id="minRowSlider"></div>

            <label for="maxRow">Maximum Row Value</label>
            <input type="text" id="maxRow" name="maxRow">
            <div id="maxRowSlider"></div>

            <button type="submit">Generate New Tab</button>

        </form>

        <button id="deleteAllTabs">
            Delete All Tables
        </button>

    </div>

    <div id="tabs">

        <ul>
            <li>
                <a href="#welcomeTab">Tables</a>
            </li>
        </ul>

        <div id="welcomeTab">
            <p>
                Generate a multiplication table using the form above.
            </p>
        </div>

    </div>

</div>

<script src="../JS/script.js"></script>

</body>
</html>
